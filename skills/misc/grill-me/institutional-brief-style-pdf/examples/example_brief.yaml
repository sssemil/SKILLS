  note_y: 494
  note: Sovereignty is your alpha. It is your ownership of the value you create and your freedom to pursue new opportunity;
    a set of economic rights and the ability to expand them. In the age of AI, institutions are being led to believe
    their choices are narrower than they are - leaving critical decisions about how this technology is being deployed
    and applied to their data in the hands of others. In reality, you have complete agency over your AI model usage.
    This is a guide through those decisions.
- type: section_divider
  title: Foundations
  title_scale_x: 103.7
  title_y: 49.0
  title_x: 53.98
- type: step
  number: I.
  title: 'Ensure zero

    data retention

    (ZDR).'
  body:
  - type: absolute_lines
    lines:
    - text: 'The first step that any institution should take to achieve data sovereignty '
      x: 237.22
      baseline_y: 72.16
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'is to ensure that any LLM usage operates under a Zero Data Retention '
      x: 237.22
      baseline_y: 85.22
      size: 9.3336
      font: medium
      color: '#212121'
    - text: '(ZDR) agreement. ZDR is a privacy concept whereby none of a '
      x: 237.22
      baseline_y: 98.3
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'customer’s data in the form of prompts, outputs and telemetry is retained '
      x: 237.22
      baseline_y: 111.36
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'beyond the ephemeral processing required to generate the request. This '
      x: 237.22
      baseline_y: 124.43
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'ensures:'
      x: 237.22
      baseline_y: 137.49
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'i) '
      x: 237.22
      baseline_y: 163.63
      size: 9.3336
      font: medium
      color: '#5DACED'
    - text: Your data is not stored to disk
      x: 245.18
      baseline_y: 163.63
      size: 9.3336
      font: medium
      color: '#212121'
    - text: ii)
      x: 237.22
      baseline_y: 189.76
      size: 9.3336
      font: medium
      color: '#5DACED'
    - text: ' Your data is not used to train models'
      x: 245.52
      baseline_y: 189.76
      size: 9.3336
      font: medium
      color: '#212121'
    - text: iii)
      x: 237.22
      baseline_y: 215.9
      size: 9.3336
      font: medium
      color: '#5DACED'
    - text: ' Your data cannot be looked at by other humans'
      x: 247.89
      baseline_y: 215.9
      size: 9.3336
      font: medium
      color: '#212121'
    - text: (ii) and (iii) are already nominally true of most enterprise contracts
      x: 237.22
      baseline_y: 242.03
      size: 9.3336
      font: medium
      color: '#212121'
    - text: with model service providers. But the wording of contracts can be
      x: 237.22
      baseline_y: 255.1
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'porous. ZDR, by ensuring that your data is never retained, presents '
      x: 237.22
      baseline_y: 268.16
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'structural barriers to illicit use. This is a vast improvement over simply '
      x: 237.22
      baseline_y: 281.23
      size: 9.3336
      font: medium
      color: '#212121'
    - text: trusting that your data will not be wielded against your interests, by
      x: 237.22
      baseline_y: 294.3
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'either model providers or third parties. ZDR protects against misuse in '
      x: 237.22
      baseline_y: 307.37
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'both the present and the future by model providers, hedging against '
      x: 237.22
      baseline_y: 320.43
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'providers altering their enterprise data usage policies to allow more '
      x: 237.22
      baseline_y: 333.5
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'training on already-collected data. And it ensures that your data will not '
      x: 237.22
      baseline_y: 346.57
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'fall into the hands of other parties. Take litigation risk as one example: '
      x: 237.22
      baseline_y: 359.64
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'tellingly, model providers have noted in public non-ZDR contracts that '
      x: 237.22
      baseline_y: 372.7
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'they will delete retained data “unless we are legally required to retain '
      x: 237.22
      baseline_y: 385.77
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'them.” Discovery during litigation can sweep up to millions of stored '
      x: 237.22
      baseline_y: 398.84
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'interactions with models, but that discovery cannot reach data fed to a '
      x: 237.22
      baseline_y: 411.9
      size: 9.3336
      font: medium
      color: '#212121'
    - text: model under a ZDR because that data was never stored.
      x: 237.22
      baseline_y: 424.97
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'ZDR is a necessary condition of data sovereignty, but it is not a sufficient '
      x: 237.22
      baseline_y: 451.11
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'one. ZDR must be negotiated with model providers. And negotiation '
      x: 237.22
      baseline_y: 464.17
      size: 9.3336
      font: medium
      color: '#212121'
    - text: requires both initial and continued leverage, otherwise providers may
      x: 237.22
      baseline_y: 477.24
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'not agree to it. ZDR also operates on a per-provider basis, meaning that it '
      x: 237.22
      baseline_y: 490.31
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'must be negotiated with separate model providers. Negotiating multiple '
      x: 237.22
      baseline_y: 503.37
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'ZDR agreements is a costly endeavor that incentivizes consolidation '
      x: 237.22
      baseline_y: 516.44
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'toward a single model provider. That pull must be resisted. It is important '
      x: 237.22
      baseline_y: 529.51
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'today that you use ZDR agreements such that your data never becomes '
      x: 237.22
      baseline_y: 542.57
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'a part of the provider’s weights or telemetry. However, you must also '
      x: 237.22
      baseline_y: 555.64
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'continuously retain the leverage to ensure that tomorrow model providers '
      x: 237.22
      baseline_y: 568.71
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'may not change the rules of the game. A breakthrough in ZDR with one '
      x: 237.22
      baseline_y: 581.78
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'model provider should be used as leverage when negotiating with '
      x: 237.22
      baseline_y: 594.84
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'another. ZDR may take many forms, and as framed by providers does not '
      x: 237.22
      baseline_y: 607.91
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'always offer complete protection. You should zoom in on the following '
      x: 237.22
      baseline_y: 620.98
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'technical specifics when negotiating ZDR, to avoid some common '
      x: 237.22
      baseline_y: 634.04
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'pitfalls. For example, model providers in some cases may maintain '
      x: 237.22
      baseline_y: 647.11
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'monitoring logs that contain customer content and metadata derived '
      x: 237.22
      baseline_y: 660.18
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'from customer content, such as safety classifier outputs. ZDR under '
      x: 237.22
      baseline_y: 673.24
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'some labs’ public terms only explicitly exclude customer content, but not '
      x: 237.22
      baseline_y: 686.31
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'the metadata derived from it, which could present opportunities for '
      x: 237.22
      baseline_y: 699.38
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'abuse. Make sure to cover off these common ancillary vectors for '
      x: 237.22
      baseline_y: 712.45
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'providers to undermine your data sovereignty. '
      x: 237.22
      baseline_y: 725.51
      size: 9.3336
      font: medium
      color: '#212121'
    gap: 0
  paragraph_gap: 0
- type: step
  number: I.
  title: Cont.
  body:
  - type: absolute_lines
    lines:
    - text: 'This includes ensuring that no human has access as a matter of course, '
      x: 224.43
      baseline_y: 71.53
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'to any logs maintained by a model provider. '
      x: 224.43
      baseline_y: 84.6
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'Extraction-Prone Models (EPM) are those (i) trained by third party firms '
      x: 224.43
      baseline_y: 110.73
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'with a structural incentive to replace or compete with your enterprise and '
      x: 224.43
      baseline_y: 123.8
      size: 9.3336
      font: medium
      color: '#212121'
    - text: '(ii) used without a ZDR agreement. EPMs pose the greatest risks of tribal '
      x: 224.43
      baseline_y: 136.86
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'knowledge being extracted from the enterprise, and the greatest risk of '
      x: 224.43
      baseline_y: 149.93
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'that knowledge being subsequently wielded against the interests of the '
      x: 224.43
      baseline_y: 163.0
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'enterprise. A zero trust posture assumes that all third-party models used '
      x: 224.43
      baseline_y: 176.07
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'without a ZDR agreement are EPM. In other words, enterprises should '
      x: 224.43
      baseline_y: 189.13
      size: 9.3336
      font: medium
      color: '#212121'
    - text: assume that any non-ZDR frontier model is extraction-prone.
      x: 224.43
      baseline_y: 202.2
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'Sovereignty is a series of decisions across the technology stack that you '
      x: 224.43
      baseline_y: 664.37
      size: 9.3336
      font: medium
      color: '#212121'
    - text: make for every workload. These decisions should be made deliberately
      x: 224.43
      baseline_y: 677.44
      size: 9.3336
      font: medium
      color: '#212121'
    - text: 'in order to maximize capability, cost, and control according to your '
      x: 224.43
      baseline_y: 690.51
      size: 9.3336
      font: medium
      color: '#212121'
    - text: priorities. Below is a general decision tree for that logic, to be tailored to
      x: 224.43
      baseline_y: 703.58
      size: 9.3336
      font: medium
      color: '#212121'
    - text: your unique architecture.
      x: 224.43
      baseline_y: 716.64
      size: 9.3336
      font: medium
      color: '#212121'
    gap: 0
  figure:
    type: zdr_architecture
    fig_no: 1
    caption: ZDR Architecture
    caption_y: 195.4
    y: 220.6
    height: 395.2
  extra_sections:
  - number: II.
    title: 'Determine your

      AI decision tree.'
    rule_y: 637.0
    top: 653.8
    body_y: 655.1
    body: []
    paragraph_gap: 0
  paragraph_gap: 0
- type: figure_full
  fig_no: 2
  caption: AI Decision Tree
  x: 69.8
